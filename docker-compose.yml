# ───────────────────────────────────────────────────────────────
# URL Shortener Production Stack
# Modern Docker Compose (v2.20+) with deploy.replicas pattern
# ───────────────────────────────────────────────────────────────

services:
  # ──────────── Core Application ────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    # Note: deploy.replicas not supported with volumes; using single instance for development
    # scale to 3 later with: docker-compose up -d --scale app=3
    environment:
      # Database
      - DATABASE_NAME=${DATABASE_NAME:-hackathon_db}
      - DATABASE_HOST=db
      - DATABASE_PORT=5432
      - DATABASE_USER=${DATABASE_USER:-postgres}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD:-postgres}
      # Cache
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # Observability
      - OTEL_SERVICE_NAME=url-shortener
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://alloy:4318
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - .:/app  # Development: mount workspace for hot-reload
    networks:
      - app-network
    # Development: auto-rebuild on changes
    develop:
      watch:
        - action: rebuild
          path: ./app
        - action: rebuild
          path: ./pyproject.toml

  # ──────────── Database ────────────
  db:
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-hackathon_db}
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - app-network

  # ──────────── Cache ────────────
  redis:
    image: redis:8-alpine
    restart: always
    command: redis-server --appendonly yes
    deploy:
      resources:
        limits:
          memory: 128M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    volumes:
      - redisdata:/data
    networks:
      - app-network

  # ──────────── Reverse Proxy + Load Balancer ────────────
  nginx:
    image: nginx:1.28-alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /var/log/nginx:/var/log/nginx
    depends_on:
      - app
    networks:
      - app-network

  # ──────────── Observability Stack ────────────

  # Grafana Alloy: Unified telemetry pipeline (logs + metrics)
  alloy:
    image: grafana/alloy:v1.15.0
    restart: always
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: ["run", "--server.http.listen-addr=0.0.0.0:12345", "/etc/alloy/config.alloy"]
    ports:
      - "4318:4318"     # OTLP HTTP receiver
      - "12345:12345"   # Alloy UI debug
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - app-network

  # Prometheus: Metrics storage
  prometheus:
    image: prom/prometheus:v3.11.0
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=3d'
      - '--storage.tsdb.wal-compression'
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - app-network

  # Loki: Logs storage
  loki:
    image: grafana/loki:3.6.10
    restart: always
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - app-network

  # Grafana: Dashboards
  grafana:
    image: grafana/grafana:12.4.2
    restart: always
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - loki
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - app-network

  # Alertmanager: Alert routing + notification
  alertmanager:
    image: prom/alertmanager:v0.31.1
    restart: always
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    environment:
      # Set Discord webhook via: docker compose -e DISCORD_WEBHOOK_URL=... up
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-http://localhost/placeholder}
    deploy:
      resources:
        limits:
          memory: 64M
    networks:
      - app-network

# ───────────────────────────────────────────────────────────────
# Volumes: Persist data across container restarts
# ───────────────────────────────────────────────────────────────
volumes:
  pgdata:
  redisdata:
  prometheus_data:
  grafana_data:
  alertmanager_data:

# ───────────────────────────────────────────────────────────────
# Network: All containers on same bridge for DNS resolution
# ───────────────────────────────────────────────────────────────
networks:
  app-network:
    driver: bridge