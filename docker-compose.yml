# ───────────────────────────────────────────────────────────────
# URL Shortener — Bronze Reliability Stack
# ───────────────────────────────────────────────────────────────

services:
  # ──────────── Core Application ────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    container_name: app
    # deploy:
    #   # 2 app replicas (2 Gunicorn workers each = 4 workers total)
    #   # Better for 1-CPU droplets to avoid context switching
    #   replicas: 2
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - app-network
    develop:
      watch:
        - action: rebuild
          path: ./app
        - action: rebuild
          path: ./pyproject.toml

  # ──────────── Database ────────────
  db:
    image: postgres:17-alpine
    restart: always
    container_name: db
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app-network

  # ──────────── Reverse Proxy ────────────
  nginx:
    image: nginx:1.28-alpine
    restart: always
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - app-network

  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: prometheus
    restart: always
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    # No external ports — access Prometheus data via Grafana (password-protected)
    networks:
      - app-network

  alertmanager:
    image: prom/alertmanager:v0.28.0
    container_name: alertmanager
    restart: always
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - alertmanager_data:/alertmanager
    command:
        - '--config.file=/etc/alertmanager/alertmanager.yml'
        - '--storage.path=/alertmanager'
    # No external ports — Alertmanager is internal only
    networks:
      - app-network

  grafana:
    image: grafana/grafana-oss:11.5.2
    container_name: grafana
    restart: always
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - app-network

  alertmanager-discord:
    image: benjojo/alertmanager-discord
    environment:
      - DISCORD_WEBHOOK=${DISCORD_WEBHOOK}
    # No external ports — receives alerts from Alertmanager internally
    networks:
      - app-network

volumes:
  pgdata:
  prometheus_data:
  alertmanager_data:
  grafana_data:

networks:
  app-network:
    driver: bridge