name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ──────── Test Gate (Bronze — Reliability) ────────
  test:
    name: Tests + Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --dev

      - name: Lint with ruff (quick check)
        run: uv run python -m py_compile app run.py tests/
        continue-on-error: true

      - name: Run tests with coverage
        run: |
          uv run pytest \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=50 \
            -v
        env:
          TESTING: "true"

      - name: Upload coverage to Codecov (optional)
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  # ──────── Auto Deploy (Silver+Gold) ────────
  deploy:
    name: Deploy to DigitalOcean
    needs: test
    runs-on: ubuntu-latest
    if: |
      github.ref == 'refs/heads/main' && 
      github.event_name == 'push'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.10.0
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          password: ${{ secrets.DROPLET_PASSWORD }}
          transport: tcp
          timeout: 30s
          script: |
            set -e
            cd /root/PE_Hackathon
            git pull origin main
            docker compose pull
            docker compose up -d --build --remove-orphans
            docker image prune -f
            echo "✓ Deployed at $(date)" >> /tmp/deploy.log
            curl -f http://localhost:5000/health || exit 1
            echo "✓ Health check passed"

      - name: Notify deployment
        if: success()
        run: |
          echo "✓ Deployment successful: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}"

  # ──────── Optional: Build Container Image ────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build (without push)
        uses: docker/build-push-action@v4
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
