# Alertmanager Configuration — Route alerts to Discord
# Alerts from Prometheus are processed here

global:
  resolve_timeout: 5m

# Route tree — groups and routes alerts
route:
  # Group alerts by name, wait 10s before sending
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 30s
  repeat_interval: 1h
  receiver: 'discord'

  # Sub-routes for different severities
  routes:
    - match:
        severity: critical
      receiver: discord_critical
      continue: true

    - match:
        severity: warning
      receiver: discord_warning

# Receivers (actions after alert fires)
receivers:
  - name: 'discord'
    discord_configs:
      - webhook_url: 'http://localhost:5000/webhook'  # TODO: Replace with real Discord webhook
        title: '{{ .GroupLabels.alertname }}'
        message: |
          **Severity:** {{ .GroupLabels.severity }}
          {{ range .Alerts -}}
          • {{ .Annotations.summary }}
            {{ .Annotations.description }}
          {{ end -}}

  - name: 'discord_critical'
    discord_configs:
      - webhook_url: 'http://localhost:5000/webhook'  # TODO: Replace with real Discord webhook
        title: '🔴 CRITICAL: {{ .GroupLabels.alertname }}'
        message: |
          {{ range .Alerts -}}
          **{{ .Annotations.summary }}**
          {{ .Annotations.description }}
          {{ end -}}

  - name: 'discord_warning'
    discord_configs:
      - webhook_url: 'http://localhost:5000/webhook'  # TODO: Replace with real Discord webhook
        title: '⚠️ WARNING: {{ .GroupLabels.alertname }}'
        message: |
          {{ range .Alerts -}}
          {{ .Annotations.summary }}
          {{ end -}}

# Inhibition rules — suppress certain alerts under conditions
inhibit_rules:
  # Suppress warning if critical is firing for same alertname
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ['alertname']

  # Suppress all alerts if we're in maintenance
  - source_match:
      alertname: MaintenanceWindow
    target_match_re:
      alertname: .*
