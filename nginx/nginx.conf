# Nginx reverse proxy + load balancer configuration
# Modern pattern:
# - Use Docker DNS to discover replicas (service_name resolves to all container IPs)
# - Per-instance memory limits prevent OOM on small droplets
# - JSON logging for structured log analysis
# - Built-in health check awareness

events {
    worker_connections 2048;
}

http {
    # Upstream: Docker DNS resolves "app" to all replicas automatically
    # When using deploy.replicas in Compose, Docker DNS round-robins across all instances
    upstream flask_app {
        server app:5000;
        # That's it! No need to list app1:5000, app2:5000, app3:5000 separately
        # Docker DNS handles service discovery + round-robin automatically
    }

    # Structured JSON logging for post-processing by Loki/Alloy
    log_format json_combined escape=json
        '{'
            '"time_local":"$time_local",'
            '"status":"$status",'
            '"remote_addr":"$remote_addr",'
            '"request":"$request",'
            '"body_bytes_sent":"$body_bytes_sent",'
            '"request_time":"$request_time",'
            '"upstream_addr":"$upstream_addr",'
            '"upstream_response_time":"$upstream_response_time",'
            '"http_user_agent":"$http_user_agent"'
        '}';

    access_log /var/log/nginx/access.log json_combined;
    error_log /var/log/nginx/error.log warn;

    # Performance tuning
    keepalive_timeout 65;
    keepalive_requests 100;
    client_max_body_size 10M;

    # Gzip compression for responses
    gzip on;
    gzip_types text/plain text/css application/json;
    gzip_min_length 1000;

    server {
        listen 80 default_server;
        server_name _;

        # Proxy all requests to upstream (Flask app)
        location / {
            proxy_pass http://flask_app;

            # Forward original request info
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            # Buffering — reduces upstream connection time
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            proxy_busy_buffers_size 8k;

            # Timeouts
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;

            # No redirects — client follows them
            proxy_redirect off;
        }

        # Health endpoint (internal only)
        location /nginx_status {
            stub_status on;
            access_log off;
            # Allow from Docker Compose network + localhost
            allow 127.0.0.1;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            deny all;
        }

        # 404 fallback
        error_page 404 =404 @not_found;
        location @not_found {
            return 404 '{"error":"not found","status":404}';
            add_header Content-Type application/json;
        }
    }
}
